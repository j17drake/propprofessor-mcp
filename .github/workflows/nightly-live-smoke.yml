name: nightly-live-smoke

on:
  schedule:
    # Runs daily at 8:00 AM Central (13:00 UTC during CDT, 14:00 UTC during CST)
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  smoke-live:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Write auth.json from secret
        env:
          PROPPROFESSOR_AUTH_JSON: ${{ secrets.PROPPROFESSOR_AUTH_JSON }}
        run: |
          test -n "$PROPPROFESSOR_AUTH_JSON"
          echo "::add-mask::$PROPPROFESSOR_AUTH_JSON"
          printf '%s' "$PROPPROFESSOR_AUTH_JSON" > auth.json

      - name: Run live smoke
        run: npm run smoke:live

      - name: Clean up auth.json
        # The runner filesystem is ephemeral, but explicit removal prevents the
        # file from being captured by any future debug-step that uploads
        # artifacts or dumps the workspace.
        if: always()
        run: rm -f auth.json
