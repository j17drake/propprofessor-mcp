name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check version consistency
        run: npm run check:version

      - name: Check README claim drift
        # Fails the build if README's "N tools" / "M tests passing" claim
        # drifts from the actual codebase. Catches the silent-rot class
        # of bugs (phantom tools, stale test counts) before they ship.
        run: npm run check:claims:quick

      - name: Check for credential leaks
        # Fails if auth.json, token-cache.json, or .propprofessor/ are ever
        # committed. Belt-and-suspenders alongside .gitignore.
        run: npm run check:secrets

      - name: Run lint
        run: npm run lint

      - name: Check JSDoc types
        # Type-check files that have opted in via `// @ts-check` directives.
        # Currently scoped to newly-added modules; expand gradually as more
        # files add the directive and fix any errors revealed.
        run: npm run check:types

      - name: Check for circular dependencies
        # Substitutes for the blocked `eslint-plugin-import/no-cycle` rule
        # (waiting on upstream support for ESLint 10). madge runs as a
        # standalone tool and exits non-zero on any cycle.
        run: npm run check:circular

      - name: Check formatting
        run: npm run format:check

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Audit dependencies
        # `npm audit` surfaces known CVEs in the dependency tree. We use the
        # `audit-level=moderate` threshold so we don't fail on dev-time
        # advisories, but do catch anything that would actually ship to users.
        # Production deps (got-scraping, superjson, playwright) are the
        # primary concern; dev deps (eslint, prettier, c8) rarely need
        # security gating.
        run: npm audit --audit-level=moderate --omit=dev
