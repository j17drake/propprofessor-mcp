name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check version consistency
        run: npm run check:version

      - name: Run lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Audit dependencies
        # `npm audit` surfaces known CVEs in the dependency tree. We use the
        # `audit-level=moderate` threshold so we don't fail on dev-time
        # advisories, but do catch anything that would actually ship to users.
        # Production deps (got-scraping, superjson, playwright) are the
        # primary concern; dev deps (eslint, prettier, c8) rarely need
        # security gating.
        run: npm audit --audit-level=moderate --omit=dev
