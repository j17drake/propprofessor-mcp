name: manual-live-smoke

on:
  workflow_dispatch:

jobs:
  smoke-live:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Write auth.json from secret
        env:
          PROPPROFESSOR_AUTH_JSON: ${{ secrets.PROPPROFESSOR_AUTH_JSON }}
        run: |
          test -n "$PROPPROFESSOR_AUTH_JSON"
          printf '%s' "$PROPPROFESSOR_AUTH_JSON" > auth.json

      - name: Run live smoke
        run: npm run smoke:live
